version: '3.12'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: billing_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/billing_db

  frontend:
    image: python:3.9-slim
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
    command: python -m http.server 8080
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
